<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 — 南阳市第二完全学校高级中学</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- ===== 登录视图 ===== -->
  <div id="loginView" class="admin-view">
    <div class="login-box">
      <img src="logo.png" alt="校徽" class="login-logo" onerror="this.style.display='none'">
      <h2>后台管理登录</h2>
      <form id="loginForm">
        <input type="text" name="username" placeholder="用户名" required autocomplete="username">
        <input type="password" name="password" placeholder="密码" required autocomplete="current-password">
        <button type="submit">登 录</button>
      </form>
      <p id="loginError" class="error-msg"></p>
    </div>
  </div>

  <!-- ===== 管理面板视图 ===== -->
  <div id="dashboardView" class="admin-view" style="display:none">
    <header class="admin-header">
      <div class="admin-header-left">
        <h1>新闻资讯管理</h1>
        <span class="admin-user">欢迎，<span id="adminUserName"></span></span>
      </div>
      <div class="admin-actions">
        <button id="btnAddNew" class="btn btn-primary">＋ 新增新闻</button>
        <button id="btnLogout" class="btn btn-outline">退出登录</button>
      </div>
    </header>

    <main class="admin-main container">

      <!-- 新闻列表 -->
      <div id="newsListView" class="admin-panel">
        <div class="panel-toolbar">
          <span class="panel-count" id="panelCount">共 0 条新闻</span>
        </div>
        <div class="table-wrapper">
          <table class="admin-table">
            <thead>
              <tr>
                <th style="width:60px">ID</th>
                <th>标题</th>
                <th style="width:80px">年份</th>
                <th style="width:100px">分类</th>
                <th style="width:80px">排序</th>
                <th style="width:120px">操作</th>
              </tr>
            </thead>
            <tbody id="newsTableBody">
              <!-- 动态填充 -->
            </tbody>
          </table>
        </div>
        <div id="emptyState" class="empty-state" style="display:none">
          <p>暂无新闻，点击「新增新闻」开始发布</p>
        </div>
      </div>

      <!-- 新增/编辑表单 -->
      <div id="newsFormView" class="admin-panel admin-form-container" style="display:none">
        <div class="form-header">
          <h2 id="formTitle">新增新闻</h2>
          <button id="btnBackToList" class="btn btn-outline">← 返回列表</button>
        </div>
        <form id="newsForm">
          <input type="hidden" name="id">

          <div class="form-row">
            <div class="form-group">
              <label>标题 <span class="required">*</span></label>
              <input type="text" name="title" placeholder="请输入新闻标题" required maxlength="100">
            </div>
            <div class="form-group">
              <label>摘要</label>
              <input type="text" name="summary" placeholder="首页显示的简短描述" maxlength="200">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>正文内容 <span class="required">*</span></label>
              <textarea name="content" rows="12" placeholder="请输入新闻正文内容，支持 HTML 标签" required></textarea>
            </div>
          </div>

          <div class="form-row form-row-3">
            <div class="form-group">
              <label>年份 <span class="required">*</span></label>
              <input type="text" name="year" placeholder="如：2025" required>
            </div>
            <div class="form-group">
              <label>分类 <span class="required">*</span></label>
              <input type="text" name="category" placeholder="如：高考、合作、建设" required>
            </div>
            <div class="form-group">
              <label>排序权重</label>
              <input type="number" name="sortOrder" value="0" placeholder="越大越靠前">
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <button type="button" id="btnCancel" class="btn btn-outline">取消</button>
          </div>
        </form>
      </div>

    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
